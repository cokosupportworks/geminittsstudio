<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぺちゃら - Gemini TTS Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        /* ContentEditable Editor Styles */
        #main-editor {
            user-select: text !important;
            -webkit-user-select: text !important;
            white-space: pre-wrap;
            word-wrap: break-word;
            outline: none;
        }
        #main-editor[placeholder]:empty:before {
            content: attr(placeholder);
            color: #9ca3af;
            cursor: text;
        }
        
        /* 改善・強化されたバッジスタイル */
        .tts-badge {
            display: inline-block; /* flexによる予期せぬ分割を防止 */
            vertical-align: baseline;
            margin: 0 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            border-width: 1px;
            border-style: solid;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            white-space: nowrap; /* 絶対に文字と×ボタンを分離・改行させない */
            cursor: default;
        }
        .tts-badge > span.label-text {
            pointer-events: none; /* ラベル部分のクリックを無効化 */
        }
        .tts-badge > span.delete-badge {
            pointer-events: auto; /* ×ボタンのみクリック許可 */
            margin-left: 6px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
            padding: 0 2px;
        }
        .tts-badge > span.delete-badge:hover {
            opacity: 1;
        }
        
        input {
            user-select: text !important;
            -webkit-user-select: text !important;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        
        .loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, memo } = React;
        
        const Icon = memo(({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }} />;
        });

        const BASE_WIDTH = 1024;
        const BASE_HEIGHT = 768;
        const STORAGE_KEY_LOGS = "gemini_tts_usage_logs_v3";
        const STORAGE_KEY_SETTINGS = "gemini_tts_app_settings_v3";

        // 全30種類の音声モデルリスト（Zephyrの性別を修正）
        const ALL_SPEAKERS = [
            // 女性音声
            { voice: "Kore", label: "👩Kore（標準・落ち着き）" },
            { voice: "Aoede", label: "👩Aoede（優しく穏やか）" },
            { voice: "Leda", label: "👩Leda（柔らかい）" },
            { voice: "Callirrhoe", label: "👩Callirrhoe（明瞭で聡明）" },
            { voice: "Autonoe", label: "👩Autonoe（明るい・元気）" },
            { voice: "Despina", label: "👩Despina（凛とした）" },
            { voice: "Erinome", label: "👩Erinome（威厳・説得力）" },
            { voice: "Laomedeia", label: "👩Laomedeia（上品な響き）" },
            { voice: "Pulcherrima", label: "👩Pulcherrima（華やか）" },
            { voice: "Vindemiatrix", label: "👩Vindemiatrix（知性的）" },
            { voice: "Schedar", label: "👩Schedar（包容力）" },
            { voice: "Zephyr", label: "👩Zephyr（軽快・爽やか）" }, // 修正：男性から女性へ移動
            // 男性音声
            { voice: "Puck", label: "👨Puck（アップビート）" },
            { voice: "Charon", label: "👨Charon（深い・低音）" },
            { voice: "Fenrir", label: "👨Fenrir（力強く野生味）" },
            { voice: "Orus", label: "👨Orus（重厚な響き）" },
            { voice: "Enceladus", label: "👨Enceladus（威厳・太い）" },
            { voice: "Iapetus", label: "👨Iapetus（渋い・重み）" },
            { voice: "Umbriel", label: "👨Umbriel（影・クール）" },
            { voice: "Algieba", label: "👨Algieba（堂々とした）" },
            { voice: "Algenib", label: "👨Algenib（シャープ）" },
            { voice: "Rasalgethi", label: "👨Rasalgethi（老成した）" },
            { voice: "Achernar", label: "👨Achernar（滑らか）" },
            { voice: "Alnilam", label: "👨Alnilam（輝かしい）" },
            { voice: "Gacrux", label: "👨Gacrux（エネルギッシュ）" },
            { voice: "Achird", label: "👨Achird（誠実な声）" },
            { voice: "Zubenelgenubi", label: "👨Zubenelgenubi（ミステリアス）" },
            { voice: "Sadachbia", label: "👨Sadachbia（温和）" },
            { voice: "Sadaltager", label: "👨Sadaltager（力強い）" },
            { voice: "Sulafat", label: "👨Sulafat（穏やかな低音）" },
        ];

        // 誤読防止：タグの実体を英語指示から日本語の「ト書き」に変更
        const STYLE_TAGS = [
            { label: "✨明るく", tag: "（明るく）", colorClasses: "bg-yellow-100 border-yellow-300 text-yellow-800" },
            { label: "🤫ささやき", tag: "（ささやき声で）", colorClasses: "bg-purple-100 border-purple-300 text-purple-800" },
            { label: "⚡興奮", tag: "（興奮して）", colorClasses: "bg-orange-100 border-orange-300 text-orange-800" },
            { label: "🌧悲しみ", tag: "（悲しそうに）", colorClasses: "bg-blue-100 border-blue-300 text-blue-800" },
            { label: "🛡厳格", tag: "（厳格に）", colorClasses: "bg-red-100 border-red-300 text-red-800" },
            { label: "🐇速く", tag: "（早口で）", colorClasses: "bg-green-100 border-green-300 text-green-800" },
            { label: "🐌ゆっくり", tag: "（ゆっくりと）", colorClasses: "bg-stone-100 border-stone-300 text-stone-800" },
        ];

        const App = () => {
            const [scale, setScale] = useState(1);
            const [userApiKey, setUserApiKey] = useState("");
            const [showApiKey, setShowApiKey] = useState(false);
            const [model, setModel] = useState("gemini-2.5-flash-preview-tts");
            const [isProcessing, setIsProcessing] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [audioFileName, setAudioFileName] = useState("voice.wav");
            const [usage, setUsage] = useState({ rpm: 0, rpd: 0 });
            const [countdown, setCountdown] = useState(0);
            const [logs, setLogs] = useState([]);
            const [modal, setModal] = useState(null);
            const [activeTab, setActiveTab] = useState('editor');
            const [serverStatus, setServerStatus] = useState("Online");

            const containerRef = useRef(null);
            const editorRef = useRef(null);
            const abortControllerRef = useRef(null);
            const savedRangeRef = useRef(null);

            useEffect(() => {
                try {
                    const savedLogs = localStorage.getItem(STORAGE_KEY_LOGS);
                    if (savedLogs) setLogs(JSON.parse(savedLogs));
                    const savedSettings = localStorage.getItem(STORAGE_KEY_SETTINGS);
                    if (savedSettings) {
                        const config = JSON.parse(savedSettings);
                        if (config.apiKey) setUserApiKey(config.apiKey);
                        if (config.model) setModel(config.model);
                        if (config.editorHtml && editorRef.current) {
                            editorRef.current.innerHTML = config.editorHtml;
                        }
                    }
                } catch (e) { console.error("Load failed", e); }
            }, []);

            useEffect(() => { 
                try { localStorage.setItem(STORAGE_KEY_LOGS, JSON.stringify(logs)); } catch(e) {}
            }, [logs]);

            const saveSettingsToStorage = () => {
                const config = { 
                    apiKey: userApiKey, 
                    model,
                    editorHtml: editorRef.current ? editorRef.current.innerHTML : ""
                };
                localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(config));
            };

            const handleResize = useCallback(() => {
                const s = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
                setScale(isNaN(s) || s <= 0 ? 1 : s);
            }, []);

            useEffect(() => {
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, [handleResize]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = Date.now();
                    const dayLogs = logs.filter(l => l.time > now - 86400000);
                    const minLogs = dayLogs.filter(l => l.time > now - 60000);
                    setUsage({ rpm: minLogs.length, rpd: dayLogs.length });
                    if (countdown > 0) setCountdown(prev => Math.max(0, prev - 1));
                }, 1000);
                return () => clearInterval(interval);
            }, [logs, countdown]);

            const saveSelection = useCallback(() => {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && editorRef.current?.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                    savedRangeRef.current = sel.getRangeAt(0);
                }
            }, []);

            // 強固なバッジHTMLを生成
            const createBadgeHTML = (label, tag, colorClasses) => {
                return `<span class="tts-badge ${colorClasses}" contenteditable="false" data-tag="${tag}"><span class="label-text">${label}</span><span class="delete-badge" title="削除">&times;</span></span>`;
            };

            const insertBadge = (html) => {
                if (editorRef.current) {
                    editorRef.current.focus();
                    const sel = window.getSelection();
                    if (savedRangeRef.current) {
                        sel.removeAllRanges();
                        sel.addRange(savedRangeRef.current);
                    }
                    document.execCommand('insertHTML', false, html + '&nbsp;');
                    saveSelection();
                    saveSettingsToStorage();
                }
            };

            // 修正：×ボタンの確実なクリック削除処理
            const handleEditorClick = (e) => {
                // クリックされたのがdelete-badge、またはその子要素か確認
                if (e.target.classList.contains('delete-badge') || e.target.closest('.delete-badge')) {
                    const badge = e.target.closest('.tts-badge');
                    if (badge) {
                        badge.remove();
                        saveSettingsToStorage();
                        if (editorRef.current) editorRef.current.focus();
                    }
                }
            };

            // 修正：DOMツリーを再帰的にパースし、余計な改行やテキスト混入を防ぐ
            const extractTextForApi = () => {
                if (!editorRef.current) return "";
                const parseNode = (n) => {
                    let txt = "";
                    if (n.nodeType === Node.TEXT_NODE) {
                        txt += n.nodeValue;
                    } else if (n.nodeType === Node.ELEMENT_NODE) {
                        if (n.classList.contains('tts-badge')) {
                            // バッジの中身（ラベルや×ボタン）は無視して、data-tagだけを抽出
                            return n.getAttribute('data-tag'); 
                        }
                        if (n.nodeName === 'BR') txt += '\n';
                        for (let child of n.childNodes) {
                            txt += parseNode(child);
                        }
                        if (n.nodeName === 'DIV' || n.nodeName === 'P') txt += '\n';
                    }
                    return txt;
                };
                return parseNode(editorRef.current).replace(/\n\n+/g, '\n').trim();
            };

            // 修正：ファイル名抽出。ト書きや空白を除去して最初の15文字を取得
            const generateFileName = (rawText) => {
                let cleanText = rawText.replace(/[a-zA-Z]+:\s*/g, '').replace(/（.*?）/g, ''); 
                cleanText = cleanText.replace(/[\s\n\r]/g, ''); 
                if (cleanText.length > 15) {
                    cleanText = cleanText.substring(0, 15);
                }
                if (!cleanText) cleanText = "voice";
                return `${cleanText}.wav`;
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length);
                const view = new DataView(buffer);
                const writeString = (offset, s) => { for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i)); };
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + pcmData.length, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); 
                view.setUint16(22, 1, true); 
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true); 
                view.setUint16(32, 2, true); 
                view.setUint16(34, 16, true); 
                writeString(36, 'data');
                view.setUint32(40, pcmData.length, true);
                const pcmUint8 = new Uint8Array(pcmData.buffer);
                for (let i = 0; i < pcmUint8.length; i++) view.setUint8(44 + i, pcmUint8[i]);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateSpeech = async () => {
                if (!userApiKey) { setModal({ title: "APIキー未設定", message: "設定からAPIキーを入力してください。" }); return; }
                
                const extractedText = extractTextForApi();
                if (!extractedText) { setModal({ title: "空の入力", message: "読み上げる文章を入力してください。" }); return; }
                
                saveSettingsToStorage(); 
                
                const usedSpeakerVoices = ALL_SPEAKERS.map(s => s.voice).filter(voice => extractedText.includes(voice + ":"));
                const uniqueVoices = [...new Set(usedSpeakerVoices)];
                
                let speechConfigObj = {};
                let finalApiText = extractedText;
                
                if (uniqueVoices.length === 0) {
                    speechConfigObj = {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                    };
                } else if (uniqueVoices.length === 1) {
                    speechConfigObj = {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: uniqueVoices[0] } }
                    };
                    const regex = new RegExp(`${uniqueVoices[0]}:\\s*`, 'g');
                    finalApiText = finalApiText.replace(regex, '');
                } else if (uniqueVoices.length === 2) {
                    speechConfigObj = {
                        multiSpeakerVoiceConfig: {
                            speakerVoiceConfigs: uniqueVoices.map(voice => ({
                                speaker: voice,
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
                            }))
                        }
                    };
                } else {
                    setModal({ 
                        title: "話者数オーバー", 
                        message: "現在のAPIの仕様上、1つの文章内で対話できる話者は「最大2名」までです。文章内の話者を2名以内に減らしてください。" 
                    });
                    return;
                }
                
                setIsProcessing(true);
                setServerStatus("Online");
                abortControllerRef.current = new AbortController();
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: finalApiText }] }],
                            generationConfig: { 
                                responseModalities: ["AUDIO"], 
                                speechConfig: speechConfigObj 
                            },
                            model: model 
                        }),
                        signal: abortControllerRef.current.signal
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        let errorMsg = err.error?.message || "リクエスト失敗";
                        
                        if (response.status === 429) {
                            setServerStatus("Quota Exceeded");
                            // エラー文から「Please retry in 〇〇s」の秒数を抽出
                            const match = errorMsg.match(/Please retry in ([\d\.]+)s/);
                            const retrySec = match ? Math.ceil(parseFloat(match[1])) : 30;
                            errorMsg = `1分間の利用制限（10回）に達しました。\n約 ${retrySec} 秒待ってから、もう一度お試しください。`;
                        } else if (errorMsg.toLowerCase().includes("internal error") || response.status >= 500) {
                            errorMsg = "AIサーバー内部でエラーが発生しました。特定のタグの組み合わせや記号が原因の可能性があります。文章を少し修正して再試行してください。";
                        }
                        throw new Error(errorMsg);
                    }

                    const result = await response.json();
                    const part = result.candidates?.[0]?.content?.parts?.[0];
                    
                    if (part && part.inlineData && part.inlineData.data) {
                        const base64Data = part.inlineData.data;
                        const binary = atob(base64Data);
                        const pcm = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) pcm[i] = binary.charCodeAt(i);
                        const rate = parseInt(part.inlineData.mimeType?.match(/rate=(\d+)/)?.[1] || "24000");
                        
                        const blob = pcmToWav(pcm, rate);
                        if (audioUrl) URL.revokeObjectURL(audioUrl);
                        setAudioUrl(URL.createObjectURL(blob));
                        setAudioFileName(generateFileName(extractedText));
                        setLogs(prev => [...prev, { time: Date.now() }]);
                        setCountdown(8);
                    } else {
                        throw new Error("音声データが生成されませんでした。");
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        setModal({ title: "エラー", message: e.message });
                    }
                } finally {
                    setIsProcessing(false);
                    abortControllerRef.current = null;
                }
            };

            const clearEditor = () => {
                if(window.confirm("テキストをクリアしますか？")) {
                    if(editorRef.current) editorRef.current.innerHTML = "";
                    setAudioUrl(null);
                    saveSettingsToStorage();
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900 flex items-center justify-center">
                    <div ref={containerRef} className="bg-gray-50 shadow-2xl relative overflow-hidden flex flex-col" style={{ width: 1024, height: 768, transform: `scale(${scale})` }}>
                        
                        {/* Loading Overlay */}
                        {isProcessing && (
                            <div className="loader-overlay">
                                <Icon name="refresh-ccw" size={80} className="animate-spin mb-6 text-blue-400" />
                                <h2 className="text-3xl font-black mb-2">音声を生成中...</h2>
                                <p className="text-lg font-bold text-gray-300">サーバーと通信しています</p>
                                <button onClick={() => abortControllerRef.current?.abort()} className="mt-10 px-10 py-4 bg-red-600 rounded-2xl font-black text-xl text-white shadow-xl hover:bg-red-700 active:scale-95 transition-all">処理を中止する</button>
                            </div>
                        )}

                        {/* Header */}
                        <header className="h-16 bg-blue-600 flex items-center justify-between px-6 text-white shadow-md flex-shrink-0 z-10">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-2 rounded-2xl shadow-sm transform -rotate-12">
                                    <Icon name="mic" className="text-blue-500" size={26} />
                                </div>
                                <div className="flex items-baseline gap-3">
                                    <h1 className="text-3xl font-black tracking-tighter" style={{ fontFamily: "'M PLUS Rounded 1c', sans-serif" }}>ぺちゃら</h1>
                                    <span className="text-[10px] font-bold text-blue-200 tracking-widest uppercase">Gemini TTS Studio v1.0</span>
                                </div>
                            </div>
                            <nav className="flex gap-2">
                                <button onClick={() => setActiveTab('editor')} className={`px-6 py-2 rounded-full font-black ${activeTab === 'editor' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}>エディタ</button>
                                <button onClick={() => setActiveTab('help')} className={`px-6 py-2 rounded-full font-black flex items-center gap-2 ${activeTab === 'help' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}><Icon name="help-circle" size={18}/>ガイド</button>
                                <button onClick={() => setActiveTab('settings')} className={`px-6 py-2 rounded-full font-black ${activeTab === 'settings' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}>設定</button>
                            </nav>
                        </header>

                        <main className="p-6 flex-1 flex gap-6 overflow-hidden bg-slate-100">
                            {activeTab === 'editor' && (
                                <>
                                    {/* LEFT PANEL (Editor & Tags) */}
                                    <div className="flex-1 flex flex-col gap-4 overflow-hidden">
                                        
                                        {/* Rich Text Editor */}
                                        <div className="flex-1 bg-white rounded-2xl shadow-sm border-2 border-gray-200 relative overflow-hidden flex flex-col">
                                            <div className="bg-slate-50 border-b border-gray-200 p-2 flex justify-between items-center px-4 shrink-0">
                                                <span className="text-xs font-black text-gray-500 tracking-widest">テキストエディタ</span>
                                                <button onClick={clearEditor} className="text-gray-400 hover:text-red-500 transition-colors p-1" title="クリア"><Icon name="trash-2" size={18}/></button>
                                            </div>
                                            <div 
                                                id="main-editor"
                                                ref={editorRef}
                                                contentEditable={true}
                                                suppressContentEditableWarning={true}
                                                className="flex-1 p-5 text-xl text-gray-800 outline-none leading-relaxed overflow-y-auto"
                                                placeholder="ここに文章を入力してください。下のボタンから話者や表情のタグを挿入できます。"
                                                onBlur={saveSelection}
                                                onKeyUp={saveSelection}
                                                onMouseUp={saveSelection}
                                                onClick={handleEditorClick}
                                                onInput={saveSettingsToStorage}
                                            ></div>
                                        </div>

                                        {/* Tags Tray */}
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 h-56 flex flex-col gap-3 shrink-0 overflow-hidden">
                                            <div className="flex-1 overflow-y-auto pr-2 space-y-4">
                                                {/* 表情タグ */}
                                                <div>
                                                    <p className="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="smile" size={14}/> 表現・スタイル (挿入先で声色が変わります)</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        {STYLE_TAGS.map((s, i) => (
                                                            <button 
                                                                key={i} 
                                                                onClick={() => insertBadge(createBadgeHTML(s.label, s.tag, s.colorClasses))} 
                                                                className={`${s.colorClasses} border px-3 py-1.5 rounded-xl text-sm font-black shadow-sm transition-transform active:scale-95`}
                                                            >
                                                                {s.label}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="w-full h-px bg-gray-100"></div>

                                                {/* 話者タグ */}
                                                <div>
                                                    <p className="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="users" size={14}/> 話者モデル (文の先頭に置くとその人の声になります)</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        {ALL_SPEAKERS.map((s, i) => {
                                                            const isFemale = s.label.includes("👩");
                                                            const colorClass = isFemale ? "bg-pink-50 border-pink-200 text-pink-700" : "bg-cyan-50 border-cyan-200 text-cyan-700";
                                                            return (
                                                                <button 
                                                                    key={i} 
                                                                    onClick={() => insertBadge(createBadgeHTML(s.label, `${s.voice}: `, colorClass))} 
                                                                    className={`${colorClass} border px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition-transform active:scale-95`}
                                                                >
                                                                    {s.label}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* RIGHT PANEL (Action & Status) */}
                                    <div className="w-80 flex flex-col gap-4 shrink-0">
                                        
                                        {/* Generate Button */}
                                        <button 
                                            onClick={generateSpeech} 
                                            disabled={countdown > 0 || isProcessing} 
                                            className={`w-full py-5 rounded-2xl font-black text-2xl flex items-center justify-center gap-3 transition-all shadow-lg ${countdown > 0 ? 'bg-gray-300 text-gray-500' : 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95'}`}
                                        >
                                            {countdown > 0 ? `待機中 (${countdown}s)` : <><Icon name="play" size={28} fill="currentColor" /> 生成する</>}
                                        </button>

                                        {/* Status */}
                                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="font-black text-gray-800 text-sm flex items-center gap-2"><Icon name="activity" size={18} className="text-blue-600" /> 使用状況</h3>
                                                <div className={`px-2 py-0.5 rounded-md text-[10px] font-black uppercase ${serverStatus === 'Online' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{serverStatus}</div>
                                            </div>
                                            <div className="mb-3">
                                                <div className="flex justify-between text-[9px] font-black text-gray-400 mb-1"><span>RPM (分間)</span><span>{usage.rpm}/10</span></div>
                                                <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden"><div className="h-full bg-blue-500 transition-all rounded-full" style={{width: `${Math.min(100, (usage.rpm/10)*100)}%`}}></div></div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-[9px] font-black text-gray-400 mb-1"><span>RPD (日間)</span><span>{usage.rpd}/1500</span></div>
                                                <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden"><div className="h-full bg-green-500 transition-all rounded-full" style={{width: `${Math.min(100, (usage.rpd/1500)*100)}%`}}></div></div>
                                            </div>
                                        </div>

                                        {/* Preview & History */}
                                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden">
                                            <h3 className="font-black text-gray-800 text-sm mb-4">音声プレビュー</h3>
                                            
                                            <div className="flex-1 flex flex-col items-center justify-center">
                                                {audioUrl ? (
                                                    <div className="w-full flex flex-col items-center gap-4">
                                                        <div className="w-20 h-20 rounded-full bg-green-100 text-green-600 flex items-center justify-center shadow-inner"><Icon name="check" size={40} /></div>
                                                        <audio src={audioUrl} controls className="w-full h-10" />
                                                        <button onClick={() => { const a = document.createElement('a'); a.href = audioUrl; a.download = audioFileName; a.click(); }} className="w-full py-3 bg-green-600 text-white rounded-xl font-black text-lg flex items-center justify-center gap-2 shadow-md hover:bg-green-700 active:scale-95"><Icon name="download" size={20} /> WAV保存</button>
                                                    </div>
                                                ) : (
                                                    <div className="text-center">
                                                        <div className="w-20 h-20 rounded-full bg-gray-50 border-4 border-dashed border-gray-200 text-gray-300 flex items-center justify-center mx-auto mb-3"><Icon name="mic" size={32} /></div>
                                                        <p className="text-xs font-bold text-gray-400">生成された音声が<br/>ここに表示されます</p>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="mt-4 pt-4 border-t border-gray-100">
                                                <p className="text-[10px] font-black text-gray-400 mb-2 flex items-center gap-1"><Icon name="clock" size={12}/> 履歴 (直近3件)</p>
                                                <div className="space-y-1.5">
                                                    {logs.slice(-3).reverse().map((l, i) => (
                                                        <div key={i} className="text-[10px] font-mono text-gray-500 bg-gray-50 p-1.5 rounded-md border border-gray-100 flex justify-between px-2">
                                                            <span>{new Date(l.time).toLocaleTimeString()}</span>
                                                            <span className="font-black text-green-600">SUCCESS</span>
                                                        </div>
                                                    ))}
                                                    {logs.length === 0 && <p className="text-[10px] text-gray-300 text-center italic">履歴なし</p>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                            
                            {/* --- HELP TAB --- */}
                            {activeTab === 'help' && (
                                <div className="flex-1 bg-white p-10 rounded-3xl shadow-lg border border-gray-100 overflow-y-auto">
                                    <h2 className="text-3xl font-black text-gray-800 mb-8 flex items-center gap-3"><Icon name="key" size={36} className="text-blue-600" /> APIキー取得ガイド</h2>
                                    <div className="space-y-8 text-lg">
                                        <section className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                            <h3 className="text-xl font-black text-blue-800 mb-4">ステップ1: 取得</h3>
                                            <p className="font-bold mb-4">以下のボタンからGoogle AI Studioにアクセスし、「Create API key」からキーを発行してください。</p>
                                            <a href="https://aistudio.google.com/app/apikey" target="_blank" className="inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-black shadow-md hover:bg-blue-700">AI Studioを開く <Icon name="external-link" size={18}/></a>
                                        </section>
                                        <section className="bg-green-50 p-6 rounded-2xl border border-green-100">
                                            <h3 className="text-xl font-black text-green-800 mb-4">ステップ2: 貼り付け</h3>
                                            <p className="font-bold">コピーしたキーを、このアプリの「設定」画面にある入力欄に貼り付け、「保存」ボタンを押してください。</p>
                                        </section>
                                    </div>
                                </div>
                            )}

                            {/* --- SETTINGS TAB --- */}
                            {activeTab === 'settings' && (
                                <div className="flex-1 bg-white p-8 rounded-3xl shadow-lg border border-gray-100 overflow-y-auto">
                                    <h2 className="text-2xl font-black text-gray-800 mb-8 flex items-center gap-2"><Icon name="settings" className="text-blue-600"/> アプリ設定</h2>
                                    <div className="space-y-8 max-w-2xl">
                                        <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100">
                                            <div className="flex justify-between items-end mb-2">
                                                <label className="text-lg font-black text-blue-800">Gemini API キー</label>
                                                <a 
                                                    href="https://aistudio.google.com/app/apikey" 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="text-xs font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm transition-colors active:scale-95"
                                                >
                                                    {userApiKey ? (
                                                        <><Icon name="external-link" size={14}/> キーを確認・再コピー</>
                                                    ) : (
                                                        <><Icon name="plus-circle" size={14}/> 新規取得 (無料)</>
                                                    )}
                                                </a>
                                            </div>
                                            <div className="flex gap-2">
                                                <input type={showApiKey ? "text" : "password"} value={userApiKey} onChange={e => setUserApiKey(e.target.value)} className="flex-1 p-4 rounded-xl border-2 border-blue-200 font-mono font-bold outline-none focus:border-blue-500 shadow-inner" placeholder="AI Studioのキーを入力..." />
                                                <button onClick={() => setShowApiKey(!showApiKey)} className="px-6 bg-white border-2 border-blue-200 rounded-xl hover:bg-gray-50 transition-colors"><Icon name={showApiKey ? "eye-off" : "eye"} /></button>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-lg font-black text-gray-700 block">使用モデルID</label>
                                            <input type="text" value={model} onChange={e => setModel(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl font-mono font-bold outline-none" />
                                        </div>
                                        <div className="pt-8 border-t border-gray-100 flex justify-between items-center">
                                            <p className="text-gray-500 font-bold text-sm">アプリの動作がおかしい場合はリセットしてください</p>
                                            <button onClick={() => { if(window.confirm("全データを削除して初期化しますか？")){localStorage.clear(); window.location.reload();} }} className="text-red-500 font-black text-sm flex items-center gap-1 hover:underline px-4 py-2 bg-red-50 rounded-lg"><Icon name="trash-2" size={16}/> 全データを初期化</button>
                                        </div>
                                        <button onClick={() => { saveSettingsToStorage(); setModal({title:"設定を保存", message:"ブラウザに保存しました。"}); setActiveTab('editor'); }} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all"><Icon name="save" size={28} /> 保存して戻る</button>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Modal */}
                        {modal && (
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[200]">
                                <div className="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl text-center border-4 border-blue-500 animate-in zoom-in duration-200 mx-4">
                                    <h2 className="text-3xl font-black mb-4 text-gray-800">{modal.title}</h2>
                                    <p className="text-xl font-bold mb-8 text-gray-500 leading-relaxed">{modal.message}</p>
                                    <button onClick={() => setModal(null)} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition-all">了解しました</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
